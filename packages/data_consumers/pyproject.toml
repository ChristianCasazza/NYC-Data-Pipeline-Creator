[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "data-consumers"
version = "0.1.0"
description = "Dev helpers for ad-hoc querying of Parquet/DuckDB warehouses with rich output"
requires-python = ">=3.10"

dependencies = [
    "duckdb>=1.4.0",
    "polars>=1.8.0",
    "rich>=13.0.0",
    "httpx>=0.27.0",
    "pyarrow>=17.0.0",
    "python-dotenv>=1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["data_consumers"]
